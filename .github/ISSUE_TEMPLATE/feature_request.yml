name: Feature Request
description: Suggest an improvement to ChessCore, ChessUI, examples, or docs.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. Please keep requests focused on reusable chess rules, notation, or SwiftUI board UI.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - ChessCore rules/models
        - FEN/SAN parsing or serialization
        - ChessUI board rendering
        - ChessUI interaction
        - Examples or tests
        - Documentation
        - Package/build setup
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What use case is hard or impossible today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: Describe the API, behavior, or documentation you would like.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Optional context about workarounds or other designs.
  - type: checkboxes
    id: scope
    attributes:
      label: Scope Check
      options:
        - label: This request does not require bundling a chess engine in SwiftChessTools.
          required: true
